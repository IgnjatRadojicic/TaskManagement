<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plantitask</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <style>
        .loading-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fafafa;
            overflow: hidden;
            user-select: none;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fade-up 0.7s ease-out 0.1s forwards;
        }

        .loading-brand {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 28px;
            color: #9CC103;
            letter-spacing: 3px;
            margin-bottom: 32px;
            opacity: 0;
            animation: fade-up 0.7s ease-out 0.3s forwards;
        }

        .line-container {
            width: 200px;
            height: 3px;
            border-radius: 3px;
            background: #e8e8e8;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            opacity: 0;
            animation: fade-in 0.5s ease-out 0.6s forwards;
        }

        .line-glow {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 60px;
            border-radius: 3px;
            background: linear-gradient(90deg, transparent, #9CC103, #b8d940, #9CC103, transparent);
            animation: line-sweep 1.8s ease-in-out 0.8s infinite;
            transform: translateX(-60px);
        }

        .loading-text {
            font-family: 'DM Sans', sans-serif;
            color: #999;
            font-size: 13px;
            letter-spacing: 0.3px;
            opacity: 0;
            animation: fade-in 0.5s ease-out 0.8s forwards;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes fade-up {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            to {
                opacity: 1;
            }
        }

        @keyframes line-sweep {
            0% {
                transform: translateX(-60px);
            }

            100% {
                transform: translateX(200px);
            }
        }

        @keyframes dots {
            0% {
                content: '';
            }

            25% {
                content: '.';
            }

            50% {
                content: '..';
            }

            75% {
                content: '...';
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <img src="images/logo.png" alt="Plantitask" class="loading-logo" />
            <div class="loading-brand">PLANTITASK</div>
            <div class="line-container">
                <div class="line-glow"></div>
            </div>
            <p class="loading-text">Loading<span class="loading-dots"></span></p>
        </div>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.6.6/pixi.min.js"></script>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <script src="js/dom-helpers.js"></script>
    <script src="js/field-engine.js"></script>
    <script src="js/scroll-watcher.js"></script>
    <script src="js/dashboard-chart.js"></script>
    <script src="js/kanban-drag.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>

</body>
</html>
