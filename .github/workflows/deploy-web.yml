name: Deploy Frontend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'Plantitask/src/Plantitask.Web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Plantitask/src/Plantitask.Web/Plantitask.Web.csproj

      - name: Publish
        run: dotnet publish Plantitask/src/Plantitask.Web/Plantitask.Web.csproj --configuration Release --output ./publish/web

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'plantitask-web'
          publish-profile: ${{ secrets.AZURE_WEB_PUBLISH_PROFILE }}
          package: ./publish/web